name: Publish Prebuilt Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            architecture: amd64
          - platform: linux/arm64
            architecture: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image archive
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          docker buildx build \
            --pull \
            --platform "$PLATFORM" \
            --tag telegram-uploader:latest \
            --output "type=docker,dest=telegram-uploader-linux-${ARCHITECTURE}.tar" \
            .
          gzip -9 "telegram-uploader-linux-${ARCHITECTURE}.tar"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.architecture }}
          path: telegram-uploader-linux-${{ matrix.architecture }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Version must look like v1.0.0" >&2
            exit 1
          fi

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-*
          path: release
          merge-multiple: true

      - name: Prepare release files
        run: |
          cp docker-compose.prod.yml release/docker-compose.prod.yml
          cp .env.example release/env.example
          cd release
          sha256sum \
            telegram-uploader-linux-amd64.tar.gz \
            telegram-uploader-linux-arm64.tar.gz \
            docker-compose.prod.yml \
            env.example > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" release/* --clobber
          else
            gh release create "$VERSION" release/* \
              --target "$GITHUB_SHA" \
              --title "Telegram Uploader $VERSION" \
              --generate-notes
          fi
