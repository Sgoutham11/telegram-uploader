services:
  telegram-uploader:
    image: telegram-uploader:latest
    container_name: telegram-uploader
    mem_limit: 700m
    mem_reservation: 256m
    pids_limit: 128
    env_file:
      - .env
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/state:/data/state
      - ./data/session:/data/session
      - ./data/logs:/data/logs
      - ./config/rclone:/config/rclone
    restart: unless-stopped
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
